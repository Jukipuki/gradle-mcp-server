name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Gradle 8.5 fixture exercises the JDK 21 / Gradle 8.x baseline.
          - java-version: 21
            fixture: sample-project
          # Gradle 9.5.1 fixture exercises the JDK 25 / Gradle 9.x upgrade.
          - java-version: 25
            fixture: sample-project-gradle9
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.fixture }}-${{ hashFiles(format('test/fixtures/{0}/**/*.gradle*', matrix.fixture), format('test/fixtures/{0}/gradle/wrapper/gradle-wrapper.properties', matrix.fixture)) }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.fixture }}-
            gradle-${{ runner.os }}-
      - run: npm ci
      - run: npm test
        env:
          GMCP_FIXTURE: ${{ matrix.fixture }}

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - run: npm --version
      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: npm publish --provenance --access public
