allprojects {
    task printGradleMcpInfo {
        doLast {
            def projectPath = project.path
            def merged = [:] as Map
            project.configurations.matching { it.name == 'compileClasspath' || it.name.endsWith('CompileClasspath') }.each { cfg ->
                if (!cfg.canBeResolved) return
                def sourceSetName = cfg.name == 'compileClasspath'
                    ? 'main'
                    : cfg.name.replaceAll(/CompileClasspath$/, '')

                def directCoords = [] as Set
                try {
                    cfg.allDependencies.each { dep ->
                        if (dep.group && dep.name && dep.version) {
                            directCoords << "${dep.group}:${dep.name}:${dep.version}".toString()
                        }
                    }
                } catch (Throwable t) {
                    println "GMCP-ERROR|${projectPath}|${cfg.name}|directs|${t.class.simpleName}: ${t.message}"
                }

                def lenient
                try {
                    lenient = cfg.resolvedConfiguration.lenientConfiguration
                } catch (Throwable t) {
                    println "GMCP-ERROR|${projectPath}|${cfg.name}|resolve|${t.class.simpleName}: ${t.message}"
                    return
                }

                try {
                    lenient.getArtifacts({ true } as org.gradle.api.specs.Spec).each { art ->
                        def coords = "${art.moduleVersion.id.group}:${art.name}:${art.moduleVersion.id.version}".toString()
                        def fpath = art.file.toString()
                        def key = "${coords}|${fpath}".toString()
                        def entry = merged[key]
                        if (entry == null) {
                            entry = [coords: coords, file: fpath, direct: false, sourceSets: [] as LinkedHashSet]
                            merged[key] = entry
                        }
                        entry.sourceSets << sourceSetName
                        if (directCoords.contains(coords)) entry.direct = true
                    }
                } catch (Throwable t) {
                    println "GMCP-ERROR|${projectPath}|${cfg.name}|artifacts|${t.class.simpleName}: ${t.message}"
                }

                try {
                    lenient.unresolvedModuleDependencies.each { un ->
                        def sel = un.selector
                        def coords = "${sel.group}:${sel.name}:${sel.version}"
                        def reason = un.problem?.message?.replaceAll(/[\r\n|]/, ' ') ?: 'unresolved'
                        println "GMCP-ERROR|${projectPath}|${cfg.name}|unresolved:${coords}|${reason}"
                    }
                } catch (Throwable t) {
                    println "GMCP-ERROR|${projectPath}|${cfg.name}|unresolved-scan|${t.class.simpleName}: ${t.message}"
                }
            }
            merged.values().each { e ->
                def flag = e.direct ? 'D' : 'T'
                def ss = e.sourceSets.join(',')
                println "GMCP|${flag}|${e.coords}|${ss}|${e.file}"
            }
        }
    }
}
